server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    types {
        text/html                 html htm;
        text/css                  css;
        application/javascript    js;
        application/octet-stream  data;
        text/plain                txt;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
