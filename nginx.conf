server {
    listen 80;

    # Si Traefik NO quita el prefijo: sirve /midi-player/* directamente
    location /midi-player/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri =404;
    }

    # Redirige /midi-player (sin slash) a /midi-player/
    location = /midi-player {
        return 301 /midi-player/;
    }

    # Si Traefik SI quita el prefijo: sirve desde raiz
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
